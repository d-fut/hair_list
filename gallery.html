<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>髪型見本一覧 — Hairstyle Reference</title>
<style>
  :root{
    --ink:#23201c; --paper:#f5f2ec; --card:#fffdf9; --line:#ddd5c7; --line2:#ece6da;
    --muted:#8d8478; --accent:#9a5b34; --accent-soft:#ecdccd;
    --sans:"Hiragino Sans","Yu Gothic UI","Noto Sans JP",-apple-system,"Segoe UI",system-ui,sans-serif;
    --mono:ui-monospace,"SFMono-Regular","DejaVu Sans Mono",monospace;
    --thumb:128px;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--paper); color:var(--ink); font-family:var(--sans); font-size:14px; line-height:1.5}
  header{position:sticky; top:0; z-index:20; background:rgba(245,242,236,.96);
    backdrop-filter:blur(6px); border-bottom:1px solid var(--line); padding:14px 22px}
  .htop{display:flex; align-items:baseline; gap:12px; flex-wrap:wrap}
  h1{font-size:18px; margin:0; font-weight:700; letter-spacing:.02em}
  h1 .en{font-family:var(--mono); font-size:10.5px; letter-spacing:.16em; text-transform:uppercase;
    color:var(--muted); font-weight:400; margin-left:6px}
  .total{font-family:var(--mono); font-size:11px; color:var(--muted); margin-left:auto}
  .controls{display:flex; flex-wrap:wrap; gap:10px 16px; align-items:center; margin-top:12px}
  .search{flex:1 1 220px; position:relative; min-width:180px}
  .search input{width:100%; padding:8px 10px 8px 30px; border:1px solid var(--line); border-radius:7px;
    background:var(--card); font:inherit; color:var(--ink)}
  .search input:focus{outline:2px solid var(--accent); outline-offset:1px}
  .search svg{position:absolute; left:9px; top:50%; transform:translateY(-50%); opacity:.5}
  .chips{display:flex; gap:6px; flex-wrap:wrap}
  .chip{appearance:none; border:1px solid var(--line); background:var(--card); color:var(--ink);
    padding:6px 11px; border-radius:999px; cursor:pointer; font-size:12.5px; white-space:nowrap}
  .chip .c{font-family:var(--mono); font-size:10px; color:var(--muted); margin-left:5px}
  .chip:hover{border-color:var(--accent)}
  .chip.on{background:var(--accent); border-color:var(--accent); color:#fff}
  .chip.on .c{color:#f0d9c8}
  .seg{display:inline-flex; border:1px solid var(--line); border-radius:7px; overflow:hidden}
  .seg button{border:0; background:var(--card); padding:7px 10px; cursor:pointer; font:inherit;
    font-size:12px; color:var(--muted)}
  .seg button+button{border-left:1px solid var(--line)}
  .seg button.on{background:var(--accent); color:#fff}
  .seglabel{font-family:var(--mono); font-size:9.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted)}
  main{padding:20px 22px 40px}
  .secttl{display:flex; align-items:baseline; gap:10px; margin:26px 0 12px; padding-bottom:7px;
    border-bottom:2px solid var(--accent-soft)}
  .secttl:first-child{margin-top:6px}
  .secttl b{font-size:16px; font-weight:700}
  .secttl .en{font-family:var(--mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted)}
  .secttl .c{margin-left:auto; font-family:var(--mono); font-size:11px; color:var(--muted)}
  .grid{display:grid; gap:12px; grid-template-columns:repeat(auto-fill,minmax(var(--thumb),1fr))}
  figure{margin:0; background:var(--card); border:1px solid var(--line); border-radius:9px;
    overflow:hidden; cursor:pointer; transition:border-color .12s, transform .12s, box-shadow .12s}
  figure:hover{border-color:var(--accent); transform:translateY(-2px); box-shadow:0 6px 18px rgba(40,32,22,.12); z-index:5}
  .thumb{position:relative; aspect-ratio:1/1; background:
    repeating-linear-gradient(45deg,#efe9de 0 9px,#eae3d6 9px 18px); overflow:hidden}
  .thumb img{width:100%; height:100%; object-fit:cover; display:block}
  .thumb .ph{position:absolute; inset:0; display:flex; flex-direction:column; gap:5px;
    align-items:center; justify-content:center; color:var(--muted); text-align:center; padding:8px}
  .thumb .ph code{font-family:var(--mono); font-size:8.5px; word-break:break-all; line-height:1.3; opacity:.75}
  figcaption{padding:7px 8px 9px}
  .ja{font-size:13px; font-weight:700; line-height:1.2}
  .en{font-family:var(--mono); font-size:9.5px; letter-spacing:.02em; color:var(--muted); margin-top:2px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .badges{display:flex; gap:4px; margin-top:5px}
  .b{font-family:var(--mono); font-size:8px; letter-spacing:.04em; text-transform:uppercase;
    padding:1px 5px; border-radius:999px; border:1px solid var(--line2); color:var(--muted)}
  .b.m{color:#345b7a; border-color:#c4d6e2}
  .b.f{color:#8a3d63; border-color:#e6cad8}
  .empty{padding:70px 0; text-align:center; color:var(--muted)}
  #lb{position:fixed; inset:0; z-index:50; background:rgba(28,24,20,.82); display:none;
    align-items:center; justify-content:center; padding:30px}
  #lb.on{display:flex}
  .lbbox{background:var(--card); border-radius:12px; overflow:hidden; max-width:min(92vw,560px);
    box-shadow:0 24px 60px rgba(0,0,0,.4)}
  .lbimg{display:flex; background:repeating-linear-gradient(45deg,#efe9de 0 12px,#eae3d6 12px 24px)}
  .lbimg img{width:100%; height:auto; max-height:70vh; object-fit:contain; display:block}
  .lbcap{padding:14px 18px 16px}
  .lbcap .ja{font-size:20px}
  .lbcap .en{font-size:12px; white-space:normal; margin-top:4px}
  .lbcap .row{display:flex; gap:14px; margin-top:10px; flex-wrap:wrap; font-family:var(--mono);
    font-size:11px; color:var(--muted)}
  .lbcap .row b{color:var(--ink); font-weight:700}
  .lbclose{position:absolute; top:18px; right:22px; color:#fff; font-size:30px; cursor:pointer;
    line-height:1; opacity:.85; font-family:var(--sans)}
  .lbclose:hover{opacity:1}
</style>
</head>

function render(){const b=document.getElementById("board"); b.innerHTML=""; const rows=DATA.filter(match);
  if(!rows.length){b.innerHTML=`<div class="empty">${phSvg}<p>該当する髪型がありません</p></div>`; foot(0); return;}
  const cats=state.cat==="all"?CAT_ORDER:[state.cat];
  for(const c of cats){const sub=rows.filter(r=>r.category_en===c); if(!sub.length)continue;
    const h=document.createElement("div"); h.className="secttl";
    h.innerHTML=`<b>${CAT_JA[c]}</b><span class="en">${c}</span><span class="c">${sub.length}</span>`;
    const g=document.createElement("div"); g.className="grid"; sub.forEach(r=>g.appendChild(fig(r)));
    b.appendChild(h); b.appendChild(g);} foot(rows.length);}
function foot(n){const el=document.getElementById("foot"); if(el) el.textContent=`${n} / ${DATA.length} 件表示`;}
function openLB(r){const box=document.getElementById("lbbox"); box.innerHTML="";
  const wrap=document.createElement("div"); wrap.className="lbimg"; wrap.appendChild(makeImg(r.filename));
  const cap=document.createElement("div"); cap.className="lbcap";
  const g=r.gender==="m"?"男性":r.gender==="f"?"女性":"—";
  cap.innerHTML=`<div class="ja">${r.name_ja}</div><div class="en">${r.name_en}</div><div class="row"><span>分類 <b>${CAT_JA[r.category_en]}</b></span><span>性別 <b>${g}</b></span><span>向き <b>${ANGLE_JA[r.angle]||r.angle}</b></span></div><div class="row"><span>tag <b>${r.prompt_tag}</b></span></div>`;
  box.appendChild(wrap); box.appendChild(cap); document.getElementById("lb").classList.add("on");}
document.getElementById("lbx").onclick=()=>document.getElementById("lb").classList.remove("on");
document.getElementById("lb").addEventListener("click",e=>{if(e.target.id==="lb")e.currentTarget.classList.remove("on");});
document.addEventListener("keydown",e=>{if(e.key==="Escape")document.getElementById("lb").classList.remove("on");});
(function(){const wrap=document.getElementById("cats"); const counts={}; DATA.forEach(r=>counts[r.category_en]=(counts[r.category_en]||0)+1);
  const all=document.createElement("button"); all.className="chip on"; all.dataset.cat="all"; all.innerHTML=`すべて<span class="c">${DATA.length}</span>`; wrap.appendChild(all);
  CAT_ORDER.forEach(c=>{const x=document.createElement("button"); x.className="chip"; x.dataset.cat=c; x.innerHTML=`${CAT_JA[c]}<span class="c">${counts[c]||0}</span>`; wrap.appendChild(x);});
  wrap.addEventListener("click",e=>{const el=e.target.closest(".chip"); if(!el)return; state.cat=el.dataset.cat; [...wrap.children].forEach(c=>c.classList.toggle("on",c===el)); render();});})();
document.getElementById("q").addEventListener("input",e=>{state.q=e.target.value; render();});
document.getElementById("gen").addEventListener("click",e=>{const b=e.target.closest("button"); if(!b)return; state.gender=b.dataset.g; [...e.currentTarget.children].forEach(x=>x.classList.toggle("on",x===b)); render();});
document.getElementById("size").addEventListener("click",e=>{const b=e.target.closest("button"); if(!b)return; document.documentElement.style.setProperty("--thumb",b.dataset.s+"px"); [...e.currentTarget.children].forEach(x=>x.classList.toggle("on",x===b));});
document.getElementById("total").textContent=`全 ${DATA.length} 種`;
render();
</script>
</body>
</html>
